version: "3.9"

services:
  # ── MongoDB ────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: crave-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: cravedb
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend API ────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: crave-backend
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      MONGO_URL: mongodb://mongo:27017/cravedb
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5174}
      RESTAURANT_ADMIN_URL: ${RESTAURANT_ADMIN_URL:-http://localhost:5175}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:5174,http://localhost:5175}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      SUPER_ADMIN_EMAIL: ${SUPER_ADMIN_EMAIL:-superadmin@crave.ae}
      SUPER_ADMIN_PASSWORD: ${SUPER_ADMIN_PASSWORD:-ChangeMe@123}
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── Customer Frontend ──────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_BACKEND_URL: ${VITE_BACKEND_URL:-http://localhost:4000}
    container_name: crave-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5174:80"

  # ── Super Admin Panel ──────────────────────────────────────────────────────
  admin-super:
    build:
      context: ./admin-super
      dockerfile: Dockerfile
      args:
        VITE_BACKEND_URL: ${VITE_BACKEND_URL:-http://localhost:4000}
    container_name: crave-admin-super
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

  # ── Restaurant Admin Panel ─────────────────────────────────────────────────
  restaurant-admin:
    build:
      context: ./restaurant-admin
      dockerfile: Dockerfile
      args:
        VITE_BACKEND_URL: ${VITE_BACKEND_URL:-http://localhost:4000}
    container_name: crave-restaurant-admin
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5175:80"

volumes:
  mongo_data:
